<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gearing Tuner!</title>
	
    <style>
    :root {
        --neon-pink: #ff0055;
        --neon-blue: #00f2ff;
        --dark-bg: #1a1a1a;
        --card-bg: #2d2d2d;
        --text-color: #e0e0e0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--dark-bg);
        color: var(--text-color);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 6px;
    }

    /* Tab Container (matching your .container style) */
    .tab-container {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        max-width: 1000px; /* Widened to better fit side-by-side content */
        width: 100%;
    }

    /* Navigation Bar */
    .tab-buttons {
        display: flex;
		justify-content: center;
        gap: 10px;
        border-bottom: 3px solid var(--neon-pink);
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    /* Tab Buttons */
    .tab-buttons button {
        background: #111;
        border: 1px solid #444;
        color: var(--text-color);
        cursor: pointer;
        padding: 12px 24px;
        border-radius: 6px 6px 0 0;
        font-size: 0.75em;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
    }

    .tab-buttons button:hover {
        border-color: var(--neon-blue);
        color: var(--neon-blue);
    }

    .tab-buttons button.active {
        background: var(--neon-pink);
        border-color: var(--neon-pink);
        color: white;
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
    }

    /* Content Area */
    .tab-content {
        display: none;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #444;
    }

    /* Frame Styling */
    iframe {
        width: 100%;
        height: 668px;
        border: none;
        display: block; /* Removes tiny bottom gap */
    }
</style>
</head>
<body>

<div class="tab-container">
    <!-- Tab navigation -->
    <div class="tab-buttons">
	    <button class="tab-link active" onclick="openTab(event, 'Gearing1')">4-Speed</button>
        <button class="tab-link" onclick="openTab(event, 'Gearing2')">6-Speed</button>
		<button class="tab-link" onclick="openTab(event, 'Gearing3')">7-Speed</button>
		<button class="tab-link" onclick="openTab(event, 'Gearing4')">8-Speed</button>
		<button class="tab-link" onclick="openTab(event, 'Gearing5')">9-speed</button>
		<button class="tab-link" onclick="openTab(event, 'Gearing6')">10-Speed</button>
    </div>

    <!-- Tab content areas with iframes -->
	<div id="Gearing1" class="tab-content" style="display: block;">
        <iframe src="Gearing1.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
	
    <div id="Gearing2" class="tab-content">
        <iframe src="Gearing2.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
	
	<div id="Gearing3" class="tab-content">
        <iframe src="Gearing3.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
	
	<div id="Gearing4" class="tab-content">
        <iframe src="Gearing4.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
	
	<div id="Gearing5" class="tab-content">
        <iframe src="Gearing5.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
	
	<div id="Gearing6" class="tab-content">
        <iframe src="Gearing6.html"></iframe> <!-- Replace with your actual file or URL -->
    </div>
</div>

<script>
function openTab(evt, tabName) {
    var i, tabcontent, tablinks;
    // Hide all tab content
    tabcontent = document.getElementsByClassName("tab-content");
    for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
    }
    // Remove "active" class from all buttons
    tablinks = document.getElementsByClassName("tab-link");
    for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
    }
    // Show current tab and add active class to clicked button
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.className += " active";
}
</script>
</body>
</html>
